name: Release Plugin

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload the plugin zip to
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Package and upload plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          set -euo pipefail

          plugin_id="$(jq -r '.id' plugin.json)"
          archive_name="${plugin_id}.zip"

          mkdir -p "dist" "package/${plugin_id}"
          cp plugin.json "package/${plugin_id}/"
          cp -R config resources src "package/${plugin_id}/"

          if [ -f README.md ]; then
            cp README.md "package/${plugin_id}/"
          fi

          find "package/${plugin_id}" -name ".DS_Store" -delete
          (cd package && zip -r "../dist/${archive_name}" "${plugin_id}")

          if unzip -l "dist/${archive_name}" | grep -E '(^|/)\.DS_Store$'; then
            echo "Archive contains .DS_Store files" >&2
            exit 1
          fi

          echo "archive_name=${archive_name}" >> "$GITHUB_ENV"

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}
        run: gh release upload "$TAG_NAME" "dist/${archive_name}" --clobber
