name: Release Plugin

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload the plugin zip to
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Package and upload plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          set -euo pipefail

          scripts/package-plugin.sh
          archive_name="$(basename "$(find dist -maxdepth 1 -type f -name '*.zip' | head -n 1)")"
          echo "archive_name=${archive_name}" >> "$GITHUB_ENV"

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}
        run: gh release upload "$TAG_NAME" "dist/${archive_name}" --clobber
